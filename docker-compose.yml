services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: spatial_cms
      POSTGRES_USER: spatial_cms
      POSTGRES_PASSWORD: spatial_cms
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/spatial_cms
      KC_DB_USERNAME: spatial_cms
      KC_DB_PASSWORD: spatial_cms
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8180"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8180"
    depends_on:
      - db
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/realm.json

  directus:
    image: directus/directus:11
    ports:
      - "8055:8055"
    depends_on:
      - db
    environment:
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: spatial_cms
      DB_USER: spatial_cms
      DB_PASSWORD: spatial_cms
      SECRET: spatial-cms-directus-secret-key
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin
    volumes:
      - directus_uploads:/directus/uploads

volumes:
  pgdata:
  directus_uploads:
