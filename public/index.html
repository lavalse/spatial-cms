function setupFileImport(models) {
  const dropzone = $('fi-dropzone');
  const fileInput = $('fi-file');
  if (!dropzone || !fileInput) return;

  dropzone.onclick = () => fileInput.click();
  dropzone.ondragover = (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--primary)'; dropzone.style.background = 'rgba(99,102,241,0.03)'; };
  dropzone.ondragleave = () => { dropzone.style.borderColor = 'var(--border)'; dropzone.style.background = ''; };
  dropzone.ondrop = (e) => { e.preventDefault(); dropzone.style.borderColor = 'var(--border)'; dropzone.style.background = ''; handleFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); };

  let fiParsedEntities = [];

  async function handleFile(file) {
    const results = $('fi-results');
    results.innerHTML = '<span style="color:var(--muted)">Parsing file...</span>';

    try {
      const text = await file.text();
      const isCSV = file.name.endsWith('.csv');
      let records = [];

      if (isCSV) {
        // Parse CSV
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) throw new Error('CSV must have a header row and at least one data row');
        const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        records = lines.slice(1).map(line => {
          const values = line.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
          const obj = {};
          headers.forEach((h, i) => { if (values[i] !== undefined && values[i] !== '') obj[h] = values[i]; });
          return obj;
        });
        dropzone.innerHTML = `<div style="color:var(--success)">&#10003; ${file.name}</div><div style="font-size:12px;color:var(--muted)">${records.length} rows, ${headers.length} columns (CSV)</div>`;
      } else {
        const data = JSON.parse(text);

        // Detect CityJSON
        if (data.type === 'CityJSON' && data.vertices && data.CityObjects) {
          records = parseCityJSON(data);
          dropzone.innerHTML = `<div style="color:var(--success)">&#10003; ${file.name}</div><div style="font-size:12px;color:var(--muted)">${records.length} city objects (CityJSON ${data.version || ''})</div>`;
        } else {
          // Parse GeoJSON
          const features = data.type === 'FeatureCollection' ? data.features : data.elements ? data.elements : Array.isArray(data) ? data : [data];
          records = features.map(f => {
            if (f.type === 'Feature') return { ...f.properties, _geometry: f.geometry };
            if (f.geometry && f.tags) return { ...f.tags, _geometry: { type: 'Polygon', coordinates: [f.geometry.map(n => [n.lon, n.lat])] } }; // OSM
            return f.properties ? { ...f.properties, _geometry: f.geometry } : f;
          });
          dropzone.innerHTML = `<div style="color:var(--success)">&#10003; ${file.name}</div><div style="font-size:12px;color:var(--muted)">${records.length} features (GeoJSON)</div>`;
        }
      }

      if (!records.length) throw new Error('No records found in file');

      // Get schema for mapping
      const modelId = $('fi-model').selectedOptions[0]?.dataset.id;
      const schema = modelId ? await api(`/definitions/models/${modelId}/schema`) : null;
      const schemaFields = schema?.fields || [];

      // Auto-detect field mapping
      const fileKeys = [...new Set(records.flatMap(r => Object.keys(r)))].filter(k => k !== '_geometry');
      const mapping = {};
      fileKeys.forEach(fk => {
        const match = schemaFields.find(sf => sf.key === fk || sf.key === fk.toLowerCase() || sf.label.toLowerCase() === fk.toLowerCase());
        if (match) mapping[fk] = match.key;
      });

      // Detect lat/lon for CSV
      const latKey = fileKeys.find(k => /^(lat|latitude)$/i.test(k));
      const lonKey = fileKeys.find(k => /^(lon|lng|longitude)$/i.test(k));

      // Show preview + mapping
      const previewRows = records.slice(0, 5);
      results.innerHTML = `
        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:14px;margin-bottom:8px">Preview (${records.length} records)</div>
          <div style="overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);max-height:180px;overflow-y:auto">
            <table style="box-shadow:none;font-size:12px"><thead><tr>${fileKeys.slice(0, 8).map(k => `<th>${k}</th>`).join('')}</tr></thead>
            <tbody>${previewRows.map(r => `<tr>${fileKeys.slice(0, 8).map(k => `<td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r[k] ?? ''}</td>`).join('')}</tr>`).join('')}</tbody></table>
          </div>
        </div>

        <div style="margin-bottom:12px">
          <div style="font-weight:600;font-size:14px;margin-bottom:8px">Field Mapping</div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px 8px;font-size:13px;align-items:center">
            <div style="font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase">File Column</div>
            <div></div>
            <div style="font-weight:600;color:var(--muted);font-size:11px;text-transform:uppercase">Model Field</div>
            ${fileKeys.filter(k => k !== '_geometry' && k !== latKey && k !== lonKey).map(fk => `
              <div><code>${fk}</code></div>
              <div style="color:var(--muted)">→</div>
              <div><select class="fi-mapping" data-file-key="${fk}" style="width:100%;padding:4px;border:1px solid var(--border);border-radius:4px;font-size:12px">
                <option value="">— skip —</option>
                ${schemaFields.map(sf => `<option value="${sf.key}" ${mapping[fk] === sf.key ? 'selected' : ''}>${sf.label} (${sf.key})</option>`).join('')}
              </select></div>
            `).join('')}
          </div>
          ${latKey && lonKey ? `<div style="margin-top:8px;font-size:12px;color:var(--success)">&#10003; Detected coordinates: ${latKey} + ${lonKey} → Point geometry</div>` : ''}
          ${!isCSV && records.some(r => r._geometry) ? `<div style="margin-top:8px;font-size:12px;color:var(--success)">&#10003; GeoJSON geometry detected</div>` : ''}
        </div>

        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn btn-outline" id="fi-validate">Validate</button>
          <button class="btn btn-primary" id="fi-import" disabled>Import</button>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);margin-left:8px"><input type="checkbox" id="fi-skip"> Skip invalid</label>
        </div>
        <div id="fi-report"></div>
      `;

      // Store parsed data for validate/import
      fiParsedEntities = records.map(r => {
        const props = {};
        // Apply mapping from current select values
        return { _raw: r, _latKey: latKey, _lonKey: lonKey, _isCSV: isCSV };
      });
      window._fiRecords = records;
      window._fiFileKeys = fileKeys;
      window._fiLatKey = latKey;
      window._fiLonKey = lonKey;
      window._fiIsCSV = isCSV;

      // Validate handler
      $('fi-validate').onclick = async () => {
        const entities = buildEntitiesFromMapping();
        const modelKey = $('fi-model').value;
        const report = $('fi-report');
        report.innerHTML = '<span style="color:var(--muted)">Validating...</span>';
        try {
          const result = await api('/ingestion/validate', { method: 'POST', body: JSON.stringify({ modelKey, entities: entities.map(e => ({ properties: e.properties, geometry: e.geometry })) }) });
          report.innerHTML = `<div style="display:flex;gap:12px;margin-bottom:8px">
            <div style="padding:8px 16px;background:#f0fdf4;border-radius:var(--radius);border:1px solid #bbf7d0;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--success)">${result.valid}</div><div style="font-size:11px;color:var(--muted)">Valid</div></div>
            ${result.invalid > 0 ? `<div style="padding:8px 16px;background:#fee2e2;border-radius:var(--radius);border:1px solid #fecaca;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--danger)">${result.invalid}</div><div style="font-size:11px;color:var(--muted)">Invalid</div></div>` : ''}
          </div>
          ${result.errors?.length ? `<div style="max-height:120px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);font-size:12px">${result.errors.slice(0, 30).map(e => `<div style="padding:4px 10px;border-bottom:1px solid var(--border)"><span style="color:var(--danger)">Row ${e.index}:</span> ${e.errors.join('; ')}</div>`).join('')}</div>` : ''}`;
          $('fi-import').disabled = false;
        } catch (err) { report.innerHTML = `<span style="color:var(--danger)">${err.message}</span>`; }
      };

      // Import handler
      $('fi-import').onclick = async () => {
        const entities = buildEntitiesFromMapping();
        const modelKey = $('fi-model').value;
        const mode = $('fi-mode').value;
        const skipInvalid = $('fi-skip')?.checked || false;
        const report = $('fi-report');
        report.innerHTML = '<span style="color:var(--muted)">Importing...</span>';
        try {
          const t0 = Date.now();
          const apiEntities = entities.map(e => ({ type: modelKey, properties: e.properties, geometry: e.geometry }));
          let result;
          if (mode === 'governed') {
            result = await api('/ingestion/governed', { method: 'POST', body: JSON.stringify({ entities: apiEntities, source: 'import_', options: { skipInvalid } }) });
            report.innerHTML = `<div style="padding:12px;background:#f0fdf4;border-radius:var(--radius);border:1px solid #bbf7d0"><strong style="color:var(--success)">${result.approved || 0} auto-approved</strong>${result.pending ? `, <strong style="color:#1e40af">${result.pending} pending review</strong>` : ''}${result.skipped ? `, ${result.skipped} skipped` : ''} · ${((Date.now()-t0)/1000).toFixed(1)}s</div>`;
          } else if (mode === 'proposal') {
            const proposals = apiEntities.map(e => ({ proposedChange: { action: 'create', data: e } }));
            result = await api('/ingestion/proposal-set', { method: 'POST', body: JSON.stringify({ proposals, source: 'import_' }) });
            report.innerHTML = `<div style="padding:12px;background:#dbeafe;border-radius:var(--radius);border:1px solid #93c5fd"><strong style="color:#1e40af">${result.created} proposals created</strong> · ${((Date.now()-t0)/1000).toFixed(1)}s</div>`;
          } else {
            result = await api('/ingestion/import', { method: 'POST', body: JSON.stringify({ entities: apiEntities, source: 'import_', options: { skipInvalid } }) });
            report.innerHTML = `<div style="padding:12px;background:#f0fdf4;border-radius:var(--radius);border:1px solid #bbf7d0"><strong style="color:var(--success)">${result.imported} imported</strong>${result.skipped ? `, ${result.skipped} skipped` : ''} · ${((Date.now()-t0)/1000).toFixed(1)}s</div>`;
          }
          refreshModels(); refreshPendingCount();
        } catch (err) { report.innerHTML = `<span style="color:var(--danger)">${err.message}</span>`; }
      };

    } catch (err) {
      results.innerHTML = `<div style="padding:12px;background:#fee2e2;border-radius:var(--radius);border:1px solid #fecaca;font-size:13px"><strong style="color:var(--danger)">Parse error:</strong> ${err.message}</div>`;
    }
  }

  function buildEntitiesFromMapping() {
    const records = window._fiRecords || [];
    const mappings = {};
    document.querySelectorAll('.fi-mapping').forEach(sel => {
      if (sel.value) mappings[sel.dataset.fileKey] = sel.value;
    });
    const latKey = window._fiLatKey;
    const lonKey = window._fiLonKey;
    const isCSV = window._fiIsCSV;

    return records.map(r => {
      const properties = {};
      for (const [fileKey, modelKey] of Object.entries(mappings)) {
        let val = r[fileKey];
        if (val !== undefined && val !== null && val !== '') {
          // Try to parse numbers from CSV
          if (isCSV && !isNaN(Number(val)) && val.trim() !== '') val = Number(val);
          properties[modelKey] = val;
        }
      }
      let geometry = null;
      if (r._geometry) {
        geometry = r._geometry;
      } else if (latKey && lonKey && r[latKey] && r[lonKey]) {
        geometry = { type: 'Point', coordinates: [parseFloat(r[lonKey]), parseFloat(r[latKey])] };
      }
      return { properties, geometry };
    });
  }
}

async function viewApiKeys(main) {

    api('/api-keys').catch(() => []),
    api('/api-keys/status').catch(() => ({ required: false })),
  ]);

  main.innerHTML = `

      </p>
      <table style="box-shadow:none;font-size:12px;margin-bottom:12px"><thead><tr><th>Scope</th><th>Access Level</th><th>Use For</th></tr></thead><tbody>
        <tr><td><code>delivery</code></td><td>Delivery API (read-only)</td><td>Consumer apps, CKAN, data portals</td></tr>

      </tbody></table>
      <pre style="font-size:12px">curl -H "X-API-Key: scms_your_key_here" ${window.location.origin}/api/v1/delivery/datasets</pre>
    </div>

    <div id="key-created-area"></div>

    <div class="card">
      <h3>Active Keys</h3>
      <div id="keys-table"></div>
    </div>`;

  // Render keys table
  function renderKeys() {
    const el = $('keys-table');
    if (!keys.length) { el.innerHTML = '<p style="color:var(--muted)">No API keys yet.</p>'; return; }
    el.innerHTML = `<table><thead><tr><th>Name</th><th>Scope</th><th>Key Prefix</th><th>Created</th><th>Status</th><th></th></tr></thead>

        <td>${badge(k.scope)}</td>
        <td><code style="font-size:12px">${k.keyPrefix}...</code></td>

        <td>${k.revokedAt ? `<span style="color:var(--danger);font-size:12px">Revoked ${new Date(k.revokedAt).toLocaleDateString()}</span>` : badge('active')}</td>
        <td>${!k.revokedAt ? `<button class="btn btn-ghost btn-sm" style="color:var(--danger)" data-revoke="${k.id}" data-key-name="${k.name}">Revoke</button>` : ''}</td>
      </tr>`).join('')}</tbody></table>`;

    el.querySelectorAll('[data-revoke]').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm(`Revoke API key "${btn.dataset.keyName}"?\n\nAny system using this key will lose access to the Delivery API.`)) return;
        try {
          await api(`/api-keys/${btn.dataset.revoke}`, { method: 'DELETE' });
          toast('Key revoked');
          nav('integrate/api-keys');
        } catch (err) { toast(err.message, 'error'); }
      };
    });
  }
  renderKeys();

  // Generate key
  $('gen-key-btn').onclick = async () => {
    const name = prompt('Key name (e.g. "CKAN Portal", "ETL Pipeline"):');
    if (!name) return;
    const scope = prompt('Scope (delivery / manage / admin):', 'delivery');
    if (!scope) return;
    try {
      const result = await api('/api-keys', { method: 'POST', body: JSON.stringify({ name, scope }) });
      $('key-created-area').innerHTML = `
        <div class="card" style="border:2px solid var(--success);background:#f0fdf4">
          <h3 style="color:var(--success);margin-bottom:8px">Key Generated</h3>
          <p style="font-size:13px;color:var(--danger);margin-bottom:12px;font-weight:600">Copy this key now. It will not be shown again.</p>
          <div style="display:flex;gap:8px;align-items:center">
            <code id="new-key-value" style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:14px;word-break:break-all">${result.key}</code>
            <button class="btn btn-primary btn-sm" onclick="copyText(document.getElementById('new-key-value').textContent)">Copy</button>
          </div>
          <div style="margin-top:8px;font-size:12px;color:var(--muted)">Name: ${result.name} &middot; Scope: ${result.scope} &middot; Prefix: ${result.keyPrefix}...</div>
        </div>`;
      keys.unshift({ id: result.id, name: result.name, keyPrefix: result.keyPrefix, createdAt: result.createdAt, revokedAt: null });
      renderKeys();
    } catch (err) { toast(err.message, 'error'); }
  };

async function pcSelectDataset() {
  const dsId = $('pc-dataset').value;
  if (!dsId) { $('pc-info').style.display = 'none'; $('pc-actions').style.display = 'none'; return; }

  $('pc-actions').style.display = 'block';
  await pcRefreshInfo(dsId);
}

async function pcRefreshInfo(dsId) {
  if (!dsId) dsId = $('pc-dataset').value;
  if (!dsId) return;

  try {
    const d = await api(`/datasets/${dsId}`);
    const bindings = await api(`/definitions/datasets/${dsId}/bindings`).catch(() => []);
    const allDs = await api('/datasets');
    const dsData = allDs.find(x => x.id === dsId);
    const activeSnapId = dsData?.activeReleaseState?.activeSnapshotId;

    const info = $('pc-info');
    info.style.display = 'block';
    info.innerHTML = `<div style="display:flex;gap:24px;margin-top:12px;font-size:14px">
      <div><span style="color:var(--muted)">Bindings:</span> ${bindings.length ? bindings.map(b => `<code>${b.modelDefinition.key}</code>`).join(', ') : (d.entityTypes || []).join(', ') || 'none'}</div>
      <div><span style="color:var(--muted)">Snapshots:</span> ${d.snapshots?.length || 0}</div>
      <div><span style="color:var(--muted)">Active:</span> ${activeSnapId ? 'v' + (d.snapshots?.find(s => s.id === activeSnapId)?.version || '?') : 'None'}</div>
    </div>`;

    // Snapshots table
    const snapEl = $('pc-snapshots');
    if (!d.snapshots?.length) {
      snapEl.innerHTML = '<p style="color:var(--muted)">No snapshots. Click "Generate Snapshot" to create one.</p>';
    } else {
      snapEl.innerHTML = `<table><thead><tr><th>Version</th><th>Status</th><th>Entities</th><th>Created</th><th></th></tr></thead>
        <tbody>${d.snapshots.map(s => {
          const isActive = s.id === activeSnapId;
          return `<tr${isActive ? ' style="background:#f0fdf4"' : ''}>
            <td>v${s.version} ${isActive ? '<span style="color:var(--success);font-weight:600;font-size:11px">ACTIVE</span>' : ''}</td>
            <td>${badge(s.status)}</td>
            <td>${Array.isArray(s.manifest) ? s.manifest.length : '?'}</td>
            <td style="color:var(--muted)">${new Date(s.createdAt).toLocaleTimeString()}</td>
            <td style="display:flex;gap:4px">${s.status === 'ready' ? `<button class="btn btn-success btn-sm" onclick="pcPublish('${s.id}',${s.version})">Publish</button>` : ''}${s.status === 'ready' || s.status === 'published' ? `<button class="btn btn-outline btn-sm" onclick="pcHookSnap('${s.id}',${s.version})">Hook</button>` : ''}</td>
          </tr>`;
        }).join('')}</tbody></table>`;
    }
  } catch (err) { pcAddLog('ERROR', err.message, false); }
}

async function pcRefresh() {
  pcAddLog('REFRESH', 'Reloading dataset info...');
  await pcRefreshInfo();
  pcAddLog('REFRESH', 'Done');
}

async function pcGenerate() {
  const dsId = $('pc-dataset').value;
  if (!dsId) return;
  try {
    pcAddLog('GENERATE', 'Creating snapshot...');
    const snap = await api(`/datasets/${dsId}/snapshot`, { method: 'POST' });
    const count = Array.isArray(snap.manifest) ? snap.manifest.length : '?';
    pcAddLog('GENERATE', `Snapshot v${snap.version} created (${count} entities, status: ${snap.status})`);
    await pcRefreshInfo(dsId);
  } catch (err) { pcAddLog('GENERATE', `Failed: ${err.message}`, false); }
}

async function pcPublish(snapId, version) {
  try {
    pcAddLog('PUBLISH', `Publishing v${version}...`);
    const pub = await api('/publications/publish', { method: 'POST', body: JSON.stringify({ datasetSnapshotId: snapId }) });
    pcAddLog('PUBLISH', `v${version} published (publication: ${pub.id.substring(0,8)}...)`);
    await pcRefreshInfo();
  } catch (err) { pcAddLog('PUBLISH', `Failed: ${err.message}`, false); }
}

async function pcPublishLatest() {
  const dsId = $('pc-dataset').value;
  if (!dsId) return;
  try {
    const d = await api(`/datasets/${dsId}`);
    const ready = d.snapshots?.find(s => s.status === 'ready');
    if (!ready) { pcAddLog('PUBLISH', 'No snapshot with status "ready" found. Generate one first.', false); return; }
    await pcPublish(ready.id, ready.version);
  } catch (err) { pcAddLog('PUBLISH', `Failed: ${err.message}`, false); }
}

async function pcRollback() {
  const dsId = $('pc-dataset').value;
  if (!dsId) return;
  try {
    pcAddLog('ROLLBACK', 'Rolling back...');
    const result = await api('/publications/rollback', { method: 'POST', body: JSON.stringify({ datasetDefinitionId: dsId }) });
    pcAddLog('ROLLBACK', `Rolled back to v${result.rolledBackTo.version}`);
    await pcRefreshInfo(dsId);
  } catch (err) { pcAddLog('ROLLBACK', `Failed: ${err.message}`, false); }
}

async function pcHook() {
  const dsId = $('pc-dataset').value;
  if (!dsId) return;
  try {
    const allDs = await api('/datasets');
    const ds = allDs.find(x => x.id === dsId);
    const activeSnapId = ds?.activeReleaseState?.activeSnapshotId;
    if (!activeSnapId) { pcAddLog('HOOK', 'No active snapshot to trigger hook for', false); return; }
    await pcHookSnap(activeSnapId, '?');
  } catch (err) { pcAddLog('HOOK', `Failed: ${err.message}`, false); }
}

async function pcHookSnap(snapId, version) {
  try {
    pcAddLog('HOOK', `Triggering hook for v${version}...`);
    const result = await api('/publications/hook', { method: 'POST', body: JSON.stringify({ datasetSnapshotId: snapId }) });
    const p = result.payload;
    pcAddLog('HOOK', `Sent: ${p.datasetDefinition.name} v${p.snapshot.version}, ${p.snapshot.entityCount} entities`);
  } catch (err) { pcAddLog('HOOK', `Failed: ${err.message}`, false); }
}

function renderApgHistory() {

      <span style="font-weight:700;color:${h.method === 'GET' ? 'var(--success)' : 'var(--primary)'}">${h.method}</span>
      <code style="color:var(--muted)">${h.path}</code>
      <span style="float:right;color:${h.ok ? 'var(--success)' : 'var(--danger)'};">${h.status}</span>

let apgCurrentEndpoint = null;

function apgSelect(gIdx, eIdx) {
  const ep = apiEndpoints[gIdx].endpoints[eIdx];
  apgCurrentEndpoint = ep;

  // Highlight active
  document.querySelectorAll('[data-apg]').forEach(el => el.style.background = '');
  const active = document.querySelector(`[data-apg="${gIdx}-${eIdx}"]`);
  if (active) active.style.background = 'var(--bg)';

  const methodColor = ep.method === 'GET' ? 'var(--success)' : 'var(--primary)';
  const params = ep.params || [];
  const pathParams = params.filter(p => p.where === 'path');
  const queryParams = params.filter(p => p.where === 'query');
  const bodyParam = params.find(p => p.where === 'body');

  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <span style="font-size:14px;font-weight:700;color:${methodColor};background:${methodColor}15;padding:4px 10px;border-radius:4px">${ep.method}</span>
      <code style="font-size:15px">/api/v1${ep.path}</code>
    </div>
    <p style="color:var(--muted);font-size:14px;margin-bottom:16px">${ep.desc}</p>`;

  if (pathParams.length) {
    html += `<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Path Parameters</div>`;
    for (const p of pathParams) {
      html += `<div class="form-group" style="margin-bottom:8px"><label>${p.key} ${p.required ? '<span style="color:var(--danger)">*</span>' : ''}</label><input id="apg-p-${p.key}" placeholder="${p.hint || ''}" style="font-family:monospace"></div>`;
    }
    html += '</div>';
  }

  if (queryParams.length) {
    html += `<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Query Parameters</div>`;
    for (const p of queryParams) {
      html += `<div class="form-group" style="margin-bottom:8px"><label>${p.key}</label><input id="apg-q-${p.key}" placeholder="${p.hint || ''}" style="font-family:monospace"></div>`;
    }
    html += '</div>';
  }

  if (bodyParam) {
    html += `<div style="margin-bottom:12px"><div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Request Body (JSON)</div>
      <textarea id="apg-body" rows="6" style="font-family:monospace;font-size:13px;width:100%;padding:12px;border:1px solid var(--border);border-radius:6px;background:#fafafa">${bodyParam.hint || '{}'}</textarea>
    </div>`;
  }

  html += `<button class="btn btn-primary" onclick="apgSend()">Send Request</button>`;

  $('apg-request').innerHTML = html;
  $('apg-response').style.display = 'none';
}

async function apgSend() {
  if (!apgCurrentEndpoint) return;
  const ep = apgCurrentEndpoint;
  const params = ep.params || [];

  // Build URL
  let path = ep.path;
  for (const p of params.filter(p => p.where === 'path')) {
    const val = $(`apg-p-${p.key}`)?.value;
    if (p.required && !val) { toast(`${p.key} is required`, 'error'); return; }
    path = path.replace(`:${p.key}`, val || '');
  }

  // Query string
  const queryParts = [];
  for (const p of params.filter(p => p.where === 'query')) {
    const val = $(`apg-q-${p.key}`)?.value;
    if (val) queryParts.push(`${p.key}=${encodeURIComponent(val)}`);
  }
  if (queryParts.length) path += '?' + queryParts.join('&');

  // Body
  const bodyParam = params.find(p => p.where === 'body');
  let body;
  if (bodyParam) {
    const raw = $('apg-body')?.value;
    if (raw) {
      try { body = raw; JSON.parse(raw); } catch { toast('Invalid JSON body', 'error'); return; }
    }
  }

  const fullPath = `/api/v1${path}`;
  const startTime = Date.now();

  try {
    const opts = { method: ep.method, headers: { 'Content-Type': 'application/json' } };
    if (body && ep.method !== 'GET') opts.body = body;
    const res = await fetch(fullPath, opts);
    const elapsed = Date.now() - startTime;
    const data = await res.json();

    // Show response
    $('apg-response').style.display = 'block';
    $('apg-resp-meta').innerHTML = `<span style="color:${res.ok ? 'var(--success)' : 'var(--danger)'}; font-weight:600">${res.status} ${res.statusText}</span> <span style="color:var(--muted)">${elapsed}ms</span>`;
    $('apg-resp-body').textContent = JSON.stringify(data, null, 2);

    // Add to history
    apgHistory.unshift({ method: ep.method, path: fullPath, status: res.status, ok: res.ok, elapsed, response: data, timestamp: new Date() });
    if (apgHistory.length > 20) apgHistory.pop();

  } catch (err) {
    $('apg-response').style.display = 'block';
    $('apg-resp-meta').innerHTML = `<span style="color:var(--danger);font-weight:600">Network Error</span>`;
    $('apg-resp-body').textContent = err.message;
  }
}

function apgShowHistory(idx) {
  const h = apgHistory[idx];
  $('apg-response').style.display = 'block';
  $('apg-resp-meta').innerHTML = `<span style="font-weight:600;color:${h.ok ? 'var(--success)' : 'var(--danger)'}">${h.status}</span> <span style="color:var(--muted)">${h.elapsed}ms &middot; ${h.timestamp.toLocaleTimeString()}</span>`;
  $('apg-resp-body').textContent = JSON.stringify(h.response, null, 2);
}

const fieldTypeInfo = {
  string: { icon: 'Aa', color: '#6366f1', desc: 'Text value' },
  number: { icon: '#', color: '#f59e0b', desc: 'Numeric value' },
  boolean: { icon: '?', color: '#22c55e', desc: 'True / False' },
  date: { icon: 'D', color: '#3b82f6', desc: 'Date value' },
  enum_: { icon: '=', color: '#8b5cf6', desc: 'One of fixed options' },
  json: { icon: '{}', color: '#6b7280', desc: 'JSON object' },
  relation: { icon: '->', color: '#ec4899', desc: 'Link to another entity' },
  geometry: { icon: 'G', color: '#14b8a6', desc: 'Spatial data' },
};

async function viewModelDetail(main, modelId) {
  const m = await api(`/definitions/models/${modelId}`);
  setBreadcrumb(['Define'], ['Models', `nav('define/models')`], [m.name]);
  setActiveNav('define/models');

  main.innerHTML = `
    <div class="page-header">
      <div><h2>${m.name}</h2><div class="sub"><code>${m.key}</code> &middot; <span class="badge badge-none">${m.geometryType}${m.is3D ? ' 3D' : ''}</span> &middot; ${(m.srid || 4326) === 4326 ? 'WGS84' : 'EPSG:' + (m.srid || 4326)} &middot; ${m.fields.length} fields</div></div>
      <button class="btn btn-outline btn-sm" style="color:var(--danger)" id="del-model-btn">Delete Model</button>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="margin:0">Fields</h3>
        <button class="btn btn-primary btn-sm" id="show-add-field">+ Add Field</button>
      </div>

      <!-- Add Field Form (hidden by default) -->
      <div id="add-field-form" style="display:none;background:var(--bg);border-radius:var(--radius);padding:20px;margin-bottom:16px;border:2px solid var(--accent)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h4 style="font-size:15px">New Field</h4>
          <button class="btn btn-ghost btn-sm" id="cancel-add-field" style="color:var(--muted)">Cancel</button>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Key <span style="color:var(--danger)">*</span></label><input id="af-key" placeholder="e.g. name, height, category" style="font-family:monospace"></div>
          <div class="form-group"><label>Display Label <span style="color:var(--danger)">*</span></label><input id="af-label" placeholder="e.g. Name, Height (m), Category"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Field Type <span style="color:var(--danger)">*</span></label>
            <select id="af-type" onchange="onFieldTypeChange()">
              ${Object.entries(fieldTypeInfo).filter(([k])=>k!=='geometry').map(([k,v]) => `<option value="${k}">${v.icon} ${k === 'enum_' ? 'enum' : k} — ${v.desc}</option>`).join('')}
            </select>
          </div>
          <div class="form-group" style="flex:0;min-width:120px">
            <label>Required</label>
            <div style="padding:8px 0"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:normal;color:var(--text)"><input type="checkbox" id="af-req"> Yes</label></div>
          </div>
        </div>
        <!-- Dynamic config area -->
        <div id="af-extra"></div>
        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-primary" id="af-btn">Add Field</button>
        </div>
      </div>

      <!-- Field List -->
      <div id="field-list">
        ${m.fields.length ? m.fields.map((f, i) => renderFieldItem(f, modelId, i)).join('') : '<div class="empty" style="padding:32px"><h4>No fields defined yet</h4><p>Add fields to define the structure of your model.</p></div>'}
      </div>
    </div>

    ${m.sourceRelations?.length ? `<div class="card"><h3>Relations</h3>${m.sourceRelations.map(r => `<div class="field-item"><div class="fi-main"><div class="fi-label"><code>${r.key}</code></div><div class="fi-meta">${r.relationType} &rarr; ${r.targetModel.name}</div></div></div>`).join('')}</div>` : ''}

    <div class="card">
      <h3>Governance Policy</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Controls how proposals for this model are processed.</p>
      <div class="form-row">
        <div class="form-group">
          <label>Approval Mode</label>
          <select id="gp-approval">
            <option value="manual">Manual — proposals require human review</option>
            <option value="auto">Auto — proposals auto-approve if validation passes</option>
          </select>
        </div>
        <div class="form-group">
          <label>Publish Mode</label>
          <select id="gp-publish">
            <option value="manual">Manual — snapshots must be published manually</option>
            <option value="auto">Auto — snapshots auto-publish on approval</option>
          </select>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
        <button class="btn btn-primary btn-sm" id="gp-save">Save Policy</button>
        <span id="gp-status" style="font-size:13px;color:var(--muted)"></span>
      </div>
    </div>`;

  // Load existing governance policy
  try {
    const policy = await api(`/definitions/governance/policies/model/${modelId}`);
    if ($('gp-approval')) $('gp-approval').value = policy.approvalMode;
    if ($('gp-publish')) $('gp-publish').value = policy.publishMode;
    $('gp-status').textContent = 'Current policy loaded';
  } catch {
    $('gp-status').textContent = 'No policy set (default: manual)';
  }

  // Save governance policy
  $('gp-save').onclick = async () => {
    try {
      await api('/definitions/governance/policies', { method: 'POST', body: JSON.stringify({
        targetType: 'model', targetId: modelId,
        approvalMode: $('gp-approval').value,
        publishMode: $('gp-publish').value,
      })});
      toast('Policy saved');
      $('gp-status').textContent = 'Saved';
    } catch (err) { toast(err.message, 'error'); }
  };

  // Toggle add-field form
  $('show-add-field').onclick = () => { $('add-field-form').style.display = 'block'; $('show-add-field').style.display = 'none'; $('af-key').focus(); };
  $('cancel-add-field').onclick = () => { $('add-field-form').style.display = 'none'; $('show-add-field').style.display = ''; };

  // Submit new field
  $('af-btn').onclick = async () => {
    const key = $('af-key').value.trim();
    const label = $('af-label').value.trim();
    if (!key || !label) { toast('Key and Label are required', 'error'); return; }
    try {
      const body = { key, label, fieldType: $('af-type').value, isRequired: $('af-req').checked };
      const enumsEl = $('af-enums');
      if (enumsEl?.value) body.enumValues = enumsEl.value.split(',').map(s => s.trim()).filter(Boolean);
      const minEl = $('af-min'), maxEl = $('af-max');
      if (minEl?.value || maxEl?.value) {
        body.validationJson = {};
        if (minEl?.value) body.validationJson.min = parseFloat(minEl.value);
        if (maxEl?.value) body.validationJson.max = parseFloat(maxEl.value);
      }
      const minLenEl = $('af-minlen'), maxLenEl = $('af-maxlen');
      if (minLenEl?.value || maxLenEl?.value) {
        body.validationJson = {};
        if (minLenEl?.value) body.validationJson.minLength = parseInt(minLenEl.value);
        if (maxLenEl?.value) body.validationJson.maxLength = parseInt(maxLenEl.value);
      }
      await api(`/definitions/models/${modelId}/fields`, { method: 'POST', body: JSON.stringify(body) });
      toast('Field added');
      reload();
    } catch (err) { toast(err.message, 'error'); }
  };

  // Delete model handler
  $('del-model-btn').onclick = async () => {
    const entityCount = await api(`/entities?type=${m.key}&pageSize=1`).then(r => r.pagination?.total ?? 0).catch(() => 0);
    const msg = entityCount > 0
      ? `DELETE "${m.name}" model?\n\n${entityCount} entities will be permanently deleted along with all versions, proposals, field definitions, and dataset bindings.\n\nThis cannot be undone.`
      : `Delete "${m.name}" model?\n\nAll field definitions, relations, and dataset bindings will be removed.`;
    if (!confirm(msg)) return;
    try {
      await api(`/definitions/models/${modelId}`, { method: 'DELETE' });
      toast(`Model "${m.name}" deleted`);
      refreshModels();
      nav('define/models');
    } catch (err) { toast(err.message, 'error'); }
  };

  // Delete field handlers
  main.querySelectorAll('[data-del-field]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm(`Delete field "${btn.dataset.fieldLabel}"?\n\nExisting entity data for this field will be preserved in the database but hidden from the UI and forms.`)) return;
      try {
        await api(`/definitions/models/${modelId}/fields/${btn.dataset.delField}`, { method: 'DELETE' });
        toast('Field deleted');
        reload();
      } catch (err) { toast(err.message, 'error'); }
    };
  });

  // Edit field handlers
  main.querySelectorAll('[data-edit-field]').forEach(btn => {
    btn.onclick = () => {
      const fieldId = btn.dataset.editField;
      const editArea = $(`edit-area-${fieldId}`);
      const isVisible = editArea.style.display === 'block';
      // Close all edit areas first
      main.querySelectorAll('[id^="edit-area-"]').forEach(el => el.style.display = 'none');
      if (!isVisible) editArea.style.display = 'block';
    };
  });

  // Save edit handlers
  main.querySelectorAll('[data-save-field]').forEach(btn => {
    btn.onclick = async () => {
      const fieldId = btn.dataset.saveField;
      try {
        const body = {};
        const labelEl = $(`ef-label-${fieldId}`);
        const reqEl = $(`ef-req-${fieldId}`);
        const enumsEl = $(`ef-enums-${fieldId}`);
        if (labelEl) body.label = labelEl.value;
        if (reqEl) body.isRequired = reqEl.checked;
        if (enumsEl?.value) body.enumValues = enumsEl.value.split(',').map(s => s.trim()).filter(Boolean);
        await api(`/definitions/models/${modelId}/fields/${fieldId}`, { method: 'PUT', body: JSON.stringify(body) });
        toast('Field updated');
        reload();
      } catch (err) { toast(err.message, 'error'); }
    };
  });
}

function renderFieldItem(f, modelId, index) {
  const info = fieldTypeInfo[f.fieldType] || { icon: '?', color: '#999', desc: '' };
  const constraints = [];
  if (f.isRequired) constraints.push('required');
  if (f.enumValues) constraints.push(`options: ${f.enumValues.join(', ')}`);
  if (f.validationJson) {
    const v = f.validationJson;
    if (v.min !== undefined) constraints.push(`min: ${v.min}`);
    if (v.max !== undefined) constraints.push(`max: ${v.max}`);
    if (v.minLength !== undefined) constraints.push(`minLength: ${v.minLength}`);
    if (v.maxLength !== undefined) constraints.push(`maxLength: ${v.maxLength}`);
  }

  return `<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;background:#fff">
    <div style="width:36px;height:36px;border-radius:8px;background:${info.color}15;color:${info.color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">${info.icon}</div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-weight:600;font-size:14px">${f.label}</span>
        <code style="font-size:12px;color:var(--muted);background:var(--bg);padding:1px 6px;border-radius:3px">${f.key}</code>
        ${f.isRequired ? '<span style="font-size:11px;color:var(--danger);font-weight:600">REQUIRED</span>' : ''}
      </div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">${f.fieldType === 'enum_' ? 'enum' : f.fieldType}${constraints.length ? ' &middot; ' + constraints.join(' &middot; ') : ''}</div>
    </div>
    <button class="btn btn-ghost btn-sm" data-edit-field="${f.id}" style="color:var(--primary)">Edit</button>
    <button class="btn btn-ghost btn-sm" data-del-field="${f.id}" data-field-label="${f.label}" style="color:var(--danger)">Delete</button>
  </div>
  <div id="edit-area-${f.id}" style="display:none;background:var(--bg);border-radius:var(--radius);padding:16px;margin:-4px 0 8px;border:1px solid var(--border)">
    <div style="display:flex;gap:12px;margin-bottom:8px">
      <div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:2px">Key</div><div style="padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-family:monospace;font-size:13px;color:var(--muted)">${f.key}</div></div>
      <div style="flex:1"><div style="font-size:11px;color:var(--muted);margin-bottom:2px">Type</div><div style="padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:13px;color:var(--muted)">${f.fieldType === 'enum_' ? 'enum' : f.fieldType}</div></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Key and type cannot be changed after creation. To change, delete this field and create a new one.</div>
    <div class="form-row">
      <div class="form-group"><label>Label</label><input id="ef-label-${f.id}" value="${f.label}"></div>
      <div class="form-group" style="flex:0;min-width:100px"><label>Required</label><div style="padding:8px 0"><label style="font-weight:normal;cursor:pointer"><input type="checkbox" id="ef-req-${f.id}" ${f.isRequired ? 'checked' : ''}> Yes</label></div></div>
    </div>
    ${f.fieldType === 'enum_' ? `<div class="form-group"><label>Enum Values (comma separated)</label><input id="ef-enums-${f.id}" value="${(f.enumValues || []).join(', ')}"></div>` : ''}
    <div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" data-save-field="${f.id}">Save</button><button class="btn btn-outline btn-sm" onclick="document.getElementById('edit-area-${f.id}').style.display='none'">Cancel</button></div>
  </div>`;
}

function onFieldTypeChange() {
  const type = $('af-type').value;
  const extra = $('af-extra');
  if (type === 'enum_') {
    extra.innerHTML = `<div class="form-group"><label>Enum Values <span style="color:var(--danger)">*</span></label><input id="af-enums" placeholder="e.g. residential, commercial, industrial"><div style="font-size:12px;color:var(--muted);margin-top:4px">Comma-separated list of allowed values</div></div>`;
  } else if (type === 'number') {
    extra.innerHTML = `<div class="form-row"><div class="form-group"><label>Min Value</label><input id="af-min" type="number" step="any" placeholder="Optional"></div><div class="form-group"><label>Max Value</label><input id="af-max" type="number" step="any" placeholder="Optional"></div></div>`;
  } else if (type === 'string') {
    extra.innerHTML = `<div class="form-row"><div class="form-group"><label>Min Length</label><input id="af-minlen" type="number" placeholder="Optional"></div><div class="form-group"><label>Max Length</label><input id="af-maxlen" type="number" placeholder="Optional"></div></div>`;
  } else {
    extra.innerHTML = '';
  }
}

// ─── Governance Overview ──────────────────────────────
async function viewGovernance(main) {
  setBreadcrumb(['Define'], ['Governance']);
  setActiveNav('define/governance');

  const models = await api('/definitions/models');
  const policies = [];
  for (const m of models) {
    let policy = null;
    try { policy = await api(`/definitions/governance/policies/model/${m.id}`); } catch {}
    policies.push({ model: m, policy });
  }

  main.innerHTML = '';
  const header = h('div', { className: 'page-header' });
  header.append(h('div', {}, h('h2', {}, 'Governance Policies'), h('div', { className: 'sub' }, `${models.length} models`)));
  main.append(header);

  if (!models.length) {
    main.append(h('div', { className: 'empty' }, h('h4', {}, 'No models yet'), h('p', {}, 'Create a model first to configure governance policies.'), h('button', { className: 'btn btn-primary', onclick: () => nav('define/models') }, 'Go to Models')));
    return;
  }

  const t = document.createElement('table');
  t.innerHTML = `<thead><tr><th>Model</th><th>Key</th><th>Approval Mode</th><th>Publish Mode</th><th></th></tr></thead>
    <tbody>${policies.map(p => `<tr>
      <td>${p.model.name}</td>
      <td><code>${p.model.key}</code></td>
      <td>${p.policy ? badge(p.policy.approvalMode === 'auto' ? 'approved' : 'pending').replace(/>(auto|pending)</, `>${p.policy.approvalMode}<`) : '<span style="color:var(--muted)">manual (default)</span>'}</td>
      <td>${p.policy ? (p.policy.publishMode === 'auto' ? '<span style="color:var(--success)">auto</span>' : '<span style="color:var(--muted)">manual</span>') : '<span style="color:var(--muted)">manual (default)</span>'}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="nav('define/models/${p.model.id}')">Edit</button></td>
    </tr>`).join('')}</tbody>`;
  main.append(t);
}

// ─── Init (called after auth completes) ────────────
async function startApp() {
  await refreshModels();
  await refreshPendingCount();
  router();
}
// startApp() is called from initKeycloak() after successful authentication
</script>
</body>
</html>
