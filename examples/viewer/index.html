<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatial CMS Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }

    .app { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 48px 1fr var(--log-height, 180px); height: 100vh; }
    .topbar { grid-column: 1 / -1; background: #0f172a; display: flex; align-items: center; padding: 0 16px; gap: 12px; border-bottom: 1px solid #1e293b; }
    .topbar h1 { font-size: 15px; font-weight: 600; color: #f8fafc; white-space: nowrap; }
    .topbar select { padding: 5px 8px; border: 1px solid #334155; border-radius: 6px; font-size: 12px; background: #1e293b; color: #e2e8f0; outline: none; max-width: 250px; }
    .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 12px; }
    .topbar .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .badge-api { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-count { background: rgba(59,130,246,0.15); color: #60a5fa; }

    .sidebar { overflow-y: auto; background: #1e293b; display: flex; flex-direction: column; }
    .panel { border-bottom: 1px solid #334155; }
    .panel-header { padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; display: flex; justify-content: space-between; cursor: pointer; }
    .panel-body { padding: 0 14px 12px; }

    .search-bar { padding: 10px 14px; }
    .search-bar input { width: 100%; padding: 7px 10px; border: 1px solid #334155; border-radius: 6px; font-size: 13px; background: #0f172a; color: #e2e8f0; outline: none; }
    .search-bar input:focus { border-color: #3b82f6; }
    .search-bar input::placeholder { color: #64748b; }

    .filters { padding: 6px 14px 10px; display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-chip { padding: 3px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #334155; cursor: pointer; background: transparent; color: #94a3b8; }
    .filter-chip:hover { border-color: #64748b; }
    .filter-chip.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .list { flex: 1; overflow-y: auto; }
    .list-item { padding: 10px 14px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: background 0.1s; }
    .list-item:hover { background: #334155; }
    .list-item.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
    .list-item .li-name { font-size: 13px; font-weight: 500; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item .li-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .li-type { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; background: #334155; color: #94a3b8; }

    .schema-field { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #334155; }
    .schema-field:last-child { border: none; }
    .sf-name { color: #e2e8f0; }
    .sf-type { color: #64748b; font-family: monospace; font-size: 11px; }

    .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
    .stat-label { color: #64748b; }
    .stat-value { color: #e2e8f0; font-weight: 600; }
    .bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
    .bar-label { min-width: 70px; text-align: right; color: #64748b; }
    .bar-fill { height: 14px; border-radius: 2px; background: #3b82f6; }
    .bar-count { color: #64748b; min-width: 24px; }

    #map { min-height: 0; }

    .view-toggle { display: flex; gap: 0; }
    .view-toggle button { padding: 4px 10px; border: 1px solid #334155; font-size: 11px; font-weight: 600; cursor: pointer; background: #1e293b; color: #64748b; }
    .view-toggle button:first-child { border-radius: 4px 0 0 4px; }
    .view-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
    .view-toggle button.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .api-log { grid-column: 1 / -1; background: #0f172a; border-top: 1px solid #1e293b; display: flex; flex-direction: column; position: relative; }
    .api-log-resize { height: 5px; cursor: ns-resize; position: absolute; top: -3px; left: 0; right: 0; z-index: 10; }
    .api-log-resize:hover { background: rgba(59,130,246,0.3); }
    .api-log-header { padding: 6px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; }
    .api-log-split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
    .api-log-list { overflow-y: auto; border-right: 1px solid #1e293b; font-family: "JetBrains Mono", Consolas, monospace; font-size: 12px; }
    .api-log-detail { overflow-y: auto; padding: 8px 14px; font-family: "JetBrains Mono", Consolas, monospace; font-size: 11px; color: #94a3b8; }
    .log-entry { padding: 4px 14px; border-bottom: 1px solid #1e293b; cursor: pointer; }
    .log-entry:hover { background: #1e293b; }
    .log-ts { color: #475569; }
    .log-method { color: #4ade80; font-weight: 700; }
    .log-url { color: #94a3b8; word-break: break-all; }
    .log-status { font-weight: 600; }
    .log-status.ok { color: #4ade80; }
    .log-status.err { color: #f87171; }
    .log-meta { color: #475569; }

    .detail-popup h3 { font-size: 14px; margin-bottom: 6px; color: #1e293b; }
    .dp-row { display: flex; gap: 6px; font-size: 12px; margin-bottom: 3px; }
    .dp-label { color: #94a3b8; min-width: 80px; }
    .dp-value { color: #334155; }

    .loading { padding: 30px; text-align: center; color: #64748b; font-size: 13px; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 48px 50vh 1fr 120px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>Viewer</h1>
    <select id="dataset-select"><option value="">Loading datasets...</option></select>
    <select id="page-size" style="padding:5px 4px;border:1px solid #334155;border-radius:6px;font-size:12px;background:#1e293b;color:#e2e8f0;outline:none;width:70px">
      <option value="100">100</option>
      <option value="200" selected>200</option>
      <option value="500">500</option>
      <option value="1000">1000</option>
      <option value="all">All</option>
    </select>
    <button id="load-btn" style="padding:5px 12px;border:1px solid #334155;border-radius:6px;font-size:12px;background:#3b82f6;color:#fff;cursor:pointer;font-weight:600" onclick="loadMapData()">Load</button>
    <div class="view-toggle">
      <button id="btn-2d" class="active" onclick="switchView('2d')">2D</button>
      <button id="btn-3d" onclick="switchView('3d')">3D</button>
    </div>
    <div class="right">
      <span class="badge badge-count" id="count-badge"></span>
      <span class="badge badge-api">Delivery API</span>
    </div>
  </div>
  <div class="sidebar">
    <div class="search-bar"><input id="search" type="text" placeholder="Search..."></div>
    <div class="filters" id="filters"></div>
    <div class="list" id="list"><div class="loading">Select a dataset above</div></div>
    <div class="panel" id="schema-panel" style="display:none">
      <div class="panel-header">Schema <span id="schema-toggle" style="font-size:10px;color:#475569">hide</span></div>
      <div class="panel-body" id="schema-body"></div>
    </div>
    <div class="panel" id="stats-panel" style="display:none">
      <div class="panel-header">Analysis</div>
      <div class="panel-body" id="stats-body"></div>
    </div>
  </div>
  <div style="position:relative">
    <div id="map" style="position:absolute;inset:0"></div>
    <div id="map-tools" style="position:absolute;top:10px;right:10px;z-index:10;display:flex;flex-direction:column;gap:6px">
      <button id="draw-bbox-btn" style="background:#fff;border:2px solid rgba(0,0,0,0.2);border-radius:4px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#3b82f6">&#x25A1; Bbox</button>
      <button id="near-search-btn" style="background:#fff;border:2px solid rgba(0,0,0,0.2);border-radius:4px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#8b5cf6">&#x25CE; Near</button>
      <button id="clear-search-btn" style="display:none;background:#fff;border:2px solid rgba(0,0,0,0.2);border-radius:4px;padding:8px 12px;cursor:pointer;font-size:13px;font-weight:600;color:#ef4444">&#x2715; Clear</button>
    </div>
  </div>
  <div class="api-log">
    <div class="api-log-resize" id="log-resize"></div>
    <div class="api-log-header"><span>API Log</span><span id="log-clear" style="cursor:pointer;color:#475569">clear</span></div>
    <div class="api-log-split">
      <div class="api-log-list" id="api-log"></div>
      <div class="api-log-detail" id="api-log-detail"><span style="color:#475569">Click a request to view response</span></div>
    </div>
  </div>
</div>

<script>
const CMS_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3001/api/v1'
  : `http://${window.location.hostname}:3001/api/v1`;

// ─── State ───
let DATASET_ID = '';
let schemaData = null;
let selectedId = null;
let activeFilter = '';
let loadTimer = null;
let lastGeoJsonData = null;
let mapReady = false;

let titleField = null;
let subtitleFields = [];
let enumField = null;
let numberField = null;
let modelName = '';

// ─── API with logging ───
const apiLogs = [];
async function apiGet(path) {
  const url = `${CMS_URL}${path}`;
  const shortUrl = path;
  const t0 = performance.now();
  try {
    const res = await fetch(url);
    const elapsed = Math.round(performance.now() - t0);
    const data = await res.json();
    const count = data.pagination?.total ?? data.features?.length ?? data.entities?.length ?? (Array.isArray(data) ? data.length : '—');
    apiLogs.unshift({ ts: new Date(), method: 'GET', url: shortUrl, status: res.status, elapsed, count, ok: res.ok, data });
    renderApiLog();
    return data;
  } catch (err) {
    const elapsed = Math.round(performance.now() - t0);
    apiLogs.unshift({ ts: new Date(), method: 'GET', url: shortUrl, status: 'ERR', elapsed, count: '—', ok: false, data: { error: err.message } });
    renderApiLog();
    throw err;
  }
}

function renderApiLog() {
  const el = document.getElementById('api-log');
  el.innerHTML = apiLogs.slice(0, 30).map((l, i) => {
    const ts = l.ts.toLocaleTimeString();
    return `<div class="log-entry" data-log-idx="${i}"><span class="log-ts">${ts}</span> <span class="log-method">${l.method}</span> <span class="log-url">${l.url}</span> <span class="log-status ${l.ok ? 'ok' : 'err'}">${l.status}</span> <span class="log-meta">${l.elapsed}ms · ${l.count}</span></div>`;
  }).join('');
  el.querySelectorAll('.log-entry').forEach(entry => {
    entry.onclick = () => {
      el.querySelectorAll('.log-entry').forEach(e => e.style.background = '');
      entry.style.background = '#1e293b';
      showLogDetail(parseInt(entry.dataset.logIdx));
    };
  });
  if (apiLogs.length) { showLogDetail(0); el.querySelector('.log-entry')?.setAttribute('style', 'cursor:pointer;background:#1e293b'); }
}
document.getElementById('log-clear').onclick = () => { apiLogs.length = 0; renderApiLog(); document.getElementById('api-log-detail').innerHTML = '<span style="color:#475569">Click a request to view response</span>'; };
function showLogDetail(i) {
  const l = apiLogs[i]; if (!l) return;
  const json = JSON.stringify(l.data, null, 2);
  document.getElementById('api-log-detail').innerHTML = `<div style="margin-bottom:8px;color:#64748b;font-size:12px"><span class="log-method">${l.method}</span> <span style="color:#e2e8f0">${l.url}</span><br><span class="log-status ${l.ok ? 'ok' : 'err'}">${l.status}</span> · ${l.elapsed}ms · ${l.count} items</div><pre style="margin:0;white-space:pre-wrap;color:#cbd5e1;font-size:11px">${json}</pre>`;
}

// Resizable API log panel
(function() {
  const handle = document.getElementById('log-resize');
  let startY, startH;
  handle.onmousedown = (e) => {
    e.preventDefault();
    startY = e.clientY;
    startH = document.querySelector('.api-log').offsetHeight;
    const onMove = (e) => {
      const newH = Math.max(80, Math.min(600, startH + (startY - e.clientY)));
      document.querySelector('.app').style.setProperty('--log-height', newH + 'px');
      map.resize();
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  };
})();

// ─── Map (MapLibre GL JS) ───
const map = new maplibregl.Map({
  container: 'map',
  style: {
    version: 8,
    sources: {
      'osm': {
        type: 'raster',
        tiles: ['https://a.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png'],
        tileSize: 256,
        attribution: '&copy; OSM &copy; CARTO',
      }
    },
    layers: [{ id: 'basemap', type: 'raster', source: 'osm' }],
  },
  center: [139.783, 35.715],
  zoom: 14,
  pitch: 0,
  bearing: 0,
  antialias: true,
});

map.on('load', () => {
  mapReady = true;

  // Entity data source
  map.addSource('entities', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  // Search overlays source (bbox rect, near circle)
  map.addSource('search-overlay', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });

  // Polygon fill (2D)
  map.addLayer({ id: 'entities-fill', type: 'fill', source: 'entities',
    filter: ['!=', ['geometry-type'], 'Point'],
    paint: { 'fill-color': '#60a5fa', 'fill-opacity': 0.25, 'fill-outline-color': '#3b82f6' }
  });

  // 3D extrusion
  map.addLayer({ id: 'entities-3d', type: 'fill-extrusion', source: 'entities',
    filter: ['all', ['!=', ['geometry-type'], 'Point'], ['has', '_height']],
    paint: {
      'fill-extrusion-color': ['interpolate', ['linear'], ['get', '_height'], 0, '#60a5fa', 20, '#818cf8', 50, '#a78bfa', 100, '#c084fc'],
      'fill-extrusion-height': ['get', '_height'],
      'fill-extrusion-base': 0,
      'fill-extrusion-opacity': 0.8,
    }
  });

  // Polygon outline
  map.addLayer({ id: 'entities-line', type: 'line', source: 'entities',
    filter: ['!=', ['geometry-type'], 'Point'],
    paint: { 'line-color': '#3b82f6', 'line-width': 1 }
  });

  // Points
  map.addLayer({ id: 'entities-points', type: 'circle', source: 'entities',
    filter: ['==', ['geometry-type'], 'Point'],
    paint: { 'circle-radius': 5, 'circle-color': '#60a5fa', 'circle-stroke-width': 1, 'circle-stroke-color': '#3b82f6' }
  });

  // Search overlay
  map.addLayer({ id: 'search-fill', type: 'fill', source: 'search-overlay',
    paint: { 'fill-color': '#3b82f6', 'fill-opacity': 0.08 }
  });
  map.addLayer({ id: 'search-line', type: 'line', source: 'search-overlay',
    paint: { 'line-color': '#3b82f6', 'line-width': 2, 'line-dasharray': [4, 4] }
  });

  // Click entity
  ['entities-fill', 'entities-3d', 'entities-points'].forEach(layerId => {
    map.on('click', layerId, (e) => {
      if (e.features?.length) {
        const f = e.features[0];
        const feature = lastGeoJsonData?.features?.find(x => x.id === f.properties._id) || f;
        selectFeature(feature, e.lngLat);
      }
    });
    map.on('mouseenter', layerId, () => { map.getCanvas().style.cursor = 'pointer'; });
    map.on('mouseleave', layerId, () => { if (!drawingBox && !nearMode) map.getCanvas().style.cursor = ''; });
  });
});

// ─── 2D/3D toggle ───
function switchView(mode) {
  document.getElementById('btn-2d').classList.toggle('active', mode === '2d');
  document.getElementById('btn-3d').classList.toggle('active', mode === '3d');
  if (mode === '3d') {
    map.easeTo({ pitch: 60, bearing: -20, duration: 800 });
  } else {
    map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
  }
}

// ─── Draw bbox / Near search ───
let drawingBox = false, drawStart = null;
let nearMode = false;
let hasSearchOverlay = false;

// Tool button handlers
document.getElementById('draw-bbox-btn').onclick = () => {
  drawingBox = true; nearMode = false;
  map.getCanvas().style.cursor = 'crosshair';
  map.dragPan.disable();
};
document.getElementById('near-search-btn').onclick = () => {
  nearMode = true; drawingBox = false;
  map.getCanvas().style.cursor = 'crosshair';
};
document.getElementById('clear-search-btn').onclick = () => {
  if (mapReady) map.getSource('search-overlay')?.setData({ type: 'FeatureCollection', features: [] });
  hasSearchOverlay = false;
  document.getElementById('clear-search-btn').style.display = 'none';
  loadMapData();
};

// Bbox draw + Near search — use canvas events for reliable draw
const canvas = map.getCanvasContainer();

canvas.addEventListener('mousedown', (e) => {
  if (!drawingBox) return;
  e.preventDefault();
  drawStart = map.unproject([e.offsetX, e.offsetY]);

  function onMove(e) {
    const cur = map.unproject([e.offsetX, e.offsetY]);
    const w = Math.min(drawStart.lng, cur.lng), s = Math.min(drawStart.lat, cur.lat);
    const ea = Math.max(drawStart.lng, cur.lng), n = Math.max(drawStart.lat, cur.lat);
    map.getSource('search-overlay')?.setData({
      type: 'FeatureCollection',
      features: [{ type: 'Feature', geometry: { type: 'Polygon', coordinates: [[[w,s],[ea,s],[ea,n],[w,n],[w,s]]] } }]
    });
  }
  function onUp(e) {
    canvas.removeEventListener('mousemove', onMove);
    canvas.removeEventListener('mouseup', onUp);
    drawingBox = false;
    map.dragPan.enable();
    map.getCanvas().style.cursor = '';

    const cur = map.unproject([e.offsetX, e.offsetY]);
    const w = Math.min(drawStart.lng, cur.lng), s = Math.min(drawStart.lat, cur.lat);
    const ea = Math.max(drawStart.lng, cur.lng), n = Math.max(drawStart.lat, cur.lat);
    drawStart = null;
    if (Math.abs(ea - w) < 0.0001 && Math.abs(n - s) < 0.0001) return; // too small
    hasSearchOverlay = true;
    document.getElementById('clear-search-btn').style.display = 'block';
    loadMapDataCustom(`bbox=${w.toFixed(5)},${s.toFixed(5)},${ea.toFixed(5)},${n.toFixed(5)}`);
  }
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
});

map.on('click', (e) => {
  if (nearMode) {
    nearMode = false;
    map.getCanvas().style.cursor = '';
    const radius = 300;
    const lng = e.lngLat.lng, lat = e.lngLat.lat;
    const pts = [];
    for (let i = 0; i <= 64; i++) {
      const a = (i / 64) * Math.PI * 2;
      pts.push([lng + radius * Math.cos(a) / (111320 * Math.cos(lat * Math.PI/180)), lat + radius * Math.sin(a) / 110540]);
    }
    map.getSource('search-overlay')?.setData({
      type: 'FeatureCollection',
      features: [{ type: 'Feature', geometry: { type: 'Polygon', coordinates: [pts] } }]
    });
    hasSearchOverlay = true;
    document.getElementById('clear-search-btn').style.display = 'block';
    loadMapDataCustom(`near=${lng.toFixed(5)},${lat.toFixed(5)}&radius=${radius}`);
  }
});

// ─── Init ───
async function init() {
  const datasets = await apiGet('/delivery/datasets');
  const select = document.getElementById('dataset-select');
  if (!datasets.length) { select.innerHTML = '<option>No published datasets</option>'; return; }

  select.innerHTML = datasets.map(d => `<option value="${d.id}">${d.name} (${d.snapshot.entityCount} features)</option>`).join('');
  select.onchange = () => loadDataset(select.value);
  loadDataset(datasets[0].id);
}

async function loadDataset(datasetId) {
  if (!datasetId) return;
  DATASET_ID = datasetId;
  selectedId = null;
  activeFilter = '';

  document.getElementById('filters').innerHTML = '';
  document.getElementById('list').innerHTML = '<div class="loading">Loading...</div>';
  document.getElementById('schema-panel').style.display = 'none';
  document.getElementById('stats-panel').style.display = 'none';

  schemaData = await apiGet(`/delivery/datasets/${DATASET_ID}/schema`);
  const models = schemaData?.models || [];
  const allFields = models.flatMap(m => m.fields || []);
  const fieldMap = {};
  allFields.forEach(f => { if (!fieldMap[f.key]) fieldMap[f.key] = f; });
  const mergedFields = Object.values(fieldMap);

  modelName = models.map(m => m.name).join(' + ') || 'Data';
  document.title = `${schemaData?.dataset || modelName} — Viewer`;
  document.getElementById('search').placeholder = `Search ${modelName}...`;

  titleField = mergedFields.find(f => f.key === 'name' && f.fieldType === 'string')
    || mergedFields.find(f => f.fieldType === 'string') || null;
  subtitleFields = mergedFields.filter(f => f !== titleField && ['number', 'string', 'enum_'].includes(f.fieldType)).slice(0, 3);
  enumField = mergedFields.find(f => f.fieldType === 'enum_' && f.enumValues?.length) || null;
  numberField = mergedFields.find(f => f.fieldType === 'number') || null;

  // Schema panel
  document.getElementById('schema-panel').style.display = 'block';
  document.getElementById('schema-body').innerHTML = models.map(m =>
    `<div style="font-size:12px;font-weight:600;color:#e2e8f0;margin:8px 0 4px">${m.name} <span style="font-weight:400;color:#64748b">${m.geometryType}</span></div>` +
    (m.fields || []).map(f => `<div class="schema-field"><span class="sf-name">${f.label}</span><span class="sf-type">${f.fieldType}${f.isRequired ? ' *' : ''}</span></div>`).join('')
  ).join('');

  let schemaVisible = true;
  document.getElementById('schema-toggle').onclick = () => {
    schemaVisible = !schemaVisible;
    document.getElementById('schema-body').style.display = schemaVisible ? '' : 'none';
    document.getElementById('schema-toggle').textContent = schemaVisible ? 'hide' : 'show';
  };

  // Filter chips
  if (enumField) {
    const el = document.getElementById('filters');
    el.innerHTML = `<span class="filter-chip active" data-val="">All</span>` +
      enumField.enumValues.slice(0, 12).map(v => `<span class="filter-chip" data-val="${v}">${v}</span>`).join('');
    el.querySelectorAll('.filter-chip').forEach(chip => {
      chip.onclick = () => {
        el.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.val;
        loadMapData();
      };
    });
  }

  document.getElementById('search').oninput = () => { clearTimeout(loadTimer); loadTimer = setTimeout(() => loadMapData(), 300); };

  loadMapData();
  loadStats();
}

// ─── Load map data ───
async function loadMapData() {
  if (!DATASET_ID) return;
  await loadMapDataCustom('');
}

async function loadMapDataCustom(spatialParam) {
  const search = document.getElementById('search').value.trim();
  let filterParam = '';
  if (activeFilter && enumField) filterParam = `&filter[${enumField.key}]=${encodeURIComponent(activeFilter)}`;

  const pageSizeVal = document.getElementById('page-size').value;
  const pageSizeParam = pageSizeVal === 'all' ? 'pageSize=10000' : `pageSize=${pageSizeVal}`;

  try {
    const params = [spatialParam, pageSizeParam, 'format=geojson'].filter(Boolean).join('&');
    const mapPath = `/delivery/datasets/${DATASET_ID}/entities?${params}${filterParam}`;
    const fc = await apiGet(mapPath);
    lastGeoJsonData = fc;
    let mapFeatures = fc.features || [];

    if (search && titleField) {
      const q = search.toLowerCase();
      mapFeatures = mapFeatures.filter(f => (f.properties?.[titleField.key] || '').toLowerCase().includes(q));
    }

    // Enrich with _height and _id for MapLibre
    const enriched = {
      type: 'FeatureCollection',
      features: mapFeatures.map(f => {
        const props = { ...(f.properties || {}), _id: f.id };
        if (!props._height) {
          if (props.height) props._height = parseFloat(props.height) || 0;
          else {
            const maxZ = extractMaxZ(f.geometry?.coordinates);
            if (maxZ > 0) props._height = maxZ;
          }
        }
        return { ...f, properties: props };
      }),
    };

    if (mapReady) {
      map.getSource('entities')?.setData(enriched);
    }

    const allListItems = mapFeatures.map(f => ({ id: f.id, properties: f.properties || {}, geometry: f.geometry }));
    renderList(allListItems);

    const total = fc.metadata?.total ?? mapFeatures.length;
    document.getElementById('count-badge').textContent = `${mapFeatures.length} loaded` + (total > mapFeatures.length ? ` / ${total} total` : '');
  } catch (err) {
    document.getElementById('list').innerHTML = `<div class="loading" style="color:#f87171">${err.message}</div>`;
  }
}

function extractMaxZ(coords) {
  if (!coords) return 0;
  if (typeof coords[0] === 'number') return coords[2] || 0;
  let max = 0;
  for (const c of coords) { const z = extractMaxZ(c); if (z > max) max = z; }
  return max;
}

function renderList(features) {
  const el = document.getElementById('list');
  const items = features.slice(0, 200);
  el.innerHTML = items.map(f => {
    const props = f.properties || {};
    const title = titleField ? (props[titleField.key] || 'Untitled') : (props.name || f.id?.substring(0, 8));
    const noGeo = f._noGeo || !f.geometry;
    const metas = subtitleFields.map(sf => {
      const v = props[sf.key];
      if (v === undefined || v === null) return '';
      if (sf.fieldType === 'enum_') return `<span class="li-type">${v}</span>`;
      if (sf.fieldType === 'number') return `${v}`;
      return String(v).substring(0, 20);
    }).filter(Boolean);
    if (noGeo) metas.push('<span style="color:#f59e0b;font-size:10px">no geometry</span>');
    if (props._type) metas.unshift(`<span class="li-type">${props._type}</span>`);

    return `<div class="list-item${selectedId === f.id ? ' active' : ''}" data-id="${f.id}">
      <div class="li-name">${title}</div>
      ${metas.length ? `<div class="li-meta">${metas.join(' · ')}</div>` : ''}
    </div>`;
  }).join('') + (features.length > 200 ? `<div class="loading">${features.length - 200} more</div>` : '');

  el.querySelectorAll('.list-item').forEach(item => {
    item.onclick = () => { const f = features.find(x => x.id === item.dataset.id); if (f) selectFeature(f); };
  });
}

function selectFeature(feature, lngLat) {
  selectedId = feature.id;
  const props = feature.properties || {};

  let rows = '';
  const entityType = props._type;
  const matchModel = schemaData?.models?.find(m => m.key === entityType);
  const popupFields = matchModel?.fields || schemaData?.models?.flatMap(m => m.fields || []) || [];
  if (popupFields.length) {
    const seen = new Set();
    for (const field of popupFields) {
      if (seen.has(field.key)) continue; seen.add(field.key);
      const val = props[field.key];
      if (val !== undefined && val !== null && val !== '') {
        rows += `<div class="dp-row"><span class="dp-label">${field.label}</span><span class="dp-value">${val}</span></div>`;
      }
    }
  } else {
    for (const [k, v] of Object.entries(props)) {
      if (k.startsWith('_')) continue;
      rows += `<div class="dp-row"><span class="dp-label">${k}</span><span class="dp-value">${v}</span></div>`;
    }
  }
  if (entityType) rows += `<div class="dp-row"><span class="dp-label">Type</span><span class="dp-value"><span class="li-type">${entityType}</span></span></div>`;

  const title = titleField ? (props[titleField.key] || 'Untitled') : (props.name || 'Feature');
  const popupHtml = `<div class="detail-popup"><h3>${title}</h3>${rows}<div style="margin-top:6px;font-size:10px;color:#94a3b8">v${props._version || '?'} · ${(feature.id || '').substring(0,8)}...</div></div>`;

  // Determine popup position
  if (!lngLat && feature.geometry?.coordinates) {
    if (feature.geometry.type === 'Point') {
      lngLat = { lng: feature.geometry.coordinates[0], lat: feature.geometry.coordinates[1] };
    } else if (feature.geometry.coordinates[0]) {
      const coords = feature.geometry.coordinates[0];
      const lons = coords.map(c => c[0]), lats = coords.map(c => c[1]);
      lngLat = { lng: (Math.min(...lons)+Math.max(...lons))/2, lat: (Math.min(...lats)+Math.max(...lats))/2 };
    }
  }

  if (lngLat) {
    new maplibregl.Popup({ maxWidth: '300px' })
      .setLngLat([lngLat.lng, lngLat.lat])
      .setHTML(popupHtml)
      .addTo(map);
  }

  document.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === selectedId);
  });
}

// ─── Stats ───
async function loadStats() {
  let all = [], page = 1;
  while (true) {
    const r = await apiGet(`/delivery/datasets/${DATASET_ID}/entities?page=${page}&pageSize=500`);
    all.push(...r.entities);
    if (all.length >= r.pagination.total) break;
    page++;
  }

  document.getElementById('stats-panel').style.display = 'block';
  const statsEl = document.getElementById('stats-body');

  let html = `<div class="stat-row"><span class="stat-label">Total</span><span class="stat-value">${all.length}</span></div>`;

  if (numberField) {
    const vals = all.map(e => e.properties[numberField.key]).filter(v => typeof v === 'number');
    if (vals.length) {
      html += `<div class="stat-row"><span class="stat-label">Avg ${numberField.label}</span><span class="stat-value">${(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)}</span></div>`;
      html += `<div class="stat-row"><span class="stat-label">Max ${numberField.label}</span><span class="stat-value">${Math.max(...vals)}</span></div>`;
    }
  }

  if (enumField) {
    const counts = {};
    all.forEach(e => { const v = e.properties[enumField.key] || '?'; counts[v] = (counts[v]||0)+1; });
    const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
    const max = sorted[0]?.[1] || 1;
    html += `<div style="margin-top:8px">${sorted.slice(0,6).map(([t,c]) =>
      `<div class="bar-row"><span class="bar-label">${t}</span><div class="bar-fill" style="width:${Math.round(c/max*100)}px"></div><span class="bar-count">${c}</span></div>`
    ).join('')}</div>`;
  }

  statsEl.innerHTML = html;
}

init().catch(err => {
  document.getElementById('list').innerHTML = `<div class="loading" style="color:#f87171">Failed to connect<br><br>${err.message}<br><br>CMS: ${CMS_URL}</div>`;
});
</script>
