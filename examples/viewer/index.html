<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatial CMS Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; }

    .app { display: grid; grid-template-columns: 360px 1fr; grid-template-rows: 48px 1fr 180px; height: 100vh; }
    .topbar { grid-column: 1 / -1; background: #0f172a; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid #1e293b; }
    .topbar h1 { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .topbar .right { display: flex; align-items: center; gap: 12px; font-size: 12px; }
    .topbar .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .badge-api { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-count { background: rgba(59,130,246,0.15); color: #60a5fa; }

    .sidebar { overflow-y: auto; background: #1e293b; display: flex; flex-direction: column; }
    .panel { border-bottom: 1px solid #334155; }
    .panel-header { padding: 10px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .panel-body { padding: 0 14px 12px; }

    .search-bar { padding: 10px 14px; }
    .search-bar input { width: 100%; padding: 7px 10px; border: 1px solid #334155; border-radius: 6px; font-size: 13px; background: #0f172a; color: #e2e8f0; outline: none; }
    .search-bar input:focus { border-color: #3b82f6; }
    .search-bar input::placeholder { color: #64748b; }

    .filters { padding: 6px 14px 10px; display: flex; gap: 4px; flex-wrap: wrap; }
    .filter-chip { padding: 3px 8px; border-radius: 4px; font-size: 11px; border: 1px solid #334155; cursor: pointer; background: transparent; color: #94a3b8; }
    .filter-chip:hover { border-color: #64748b; }
    .filter-chip.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    .list { flex: 1; overflow-y: auto; }
    .list-item { padding: 10px 14px; border-bottom: 1px solid #1e293b; cursor: pointer; transition: background 0.1s; }
    .list-item:hover { background: #334155; }
    .list-item.active { background: #1e3a5f; border-left: 3px solid #3b82f6; }
    .list-item .li-name { font-size: 13px; font-weight: 500; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .list-item .li-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .li-type { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; background: #334155; color: #94a3b8; }

    .schema-field { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid #334155; }
    .schema-field:last-child { border: none; }
    .sf-name { color: #e2e8f0; }
    .sf-type { color: #64748b; font-family: monospace; font-size: 11px; }

    .stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
    .stat-label { color: #64748b; }
    .stat-value { color: #e2e8f0; font-weight: 600; }

    .bar-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
    .bar-label { min-width: 70px; text-align: right; color: #64748b; }
    .bar-fill { height: 14px; border-radius: 2px; background: #3b82f6; }
    .bar-count { color: #64748b; min-width: 24px; }

    #map { min-height: 0; }

    /* API Log panel */
    .api-log { grid-column: 1 / -1; background: #0f172a; border-top: 1px solid #1e293b; display: flex; flex-direction: column; }
    .api-log-header { padding: 6px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #64748b; display: flex; justify-content: space-between; border-bottom: 1px solid #1e293b; }
    .api-log-body { flex: 1; overflow-y: auto; font-family: "JetBrains Mono", Consolas, monospace; font-size: 12px; padding: 4px 0; }
    .log-entry { padding: 4px 14px; border-bottom: 1px solid #1e293b; }
    .log-entry:hover { background: #1e293b; }
    .log-ts { color: #475569; }
    .log-method { color: #4ade80; font-weight: 700; }
    .log-url { color: #94a3b8; }
    .log-status { font-weight: 600; }
    .log-status.ok { color: #4ade80; }
    .log-status.err { color: #f87171; }
    .log-meta { color: #475569; }

    .detail-popup h3 { font-size: 14px; margin-bottom: 6px; color: #1e293b; }
    .dp-row { display: flex; gap: 6px; font-size: 12px; margin-bottom: 3px; }
    .dp-label { color: #94a3b8; min-width: 80px; }
    .dp-value { color: #334155; }

    .loading { padding: 30px; text-align: center; color: #64748b; font-size: 13px; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; grid-template-rows: 48px 50vh 1fr 120px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1 id="app-title">Spatial CMS Viewer</h1>
    <div class="right">
      <span class="badge badge-count" id="count-badge">Loading...</span>
      <span class="badge badge-api">Delivery API</span>
    </div>
  </div>
  <div class="sidebar">
    <div class="search-bar"><input id="search" type="text" placeholder="Search buildings..."></div>
    <div class="filters" id="filters"></div>
    <div class="list" id="list"><div class="loading">Connecting to API...</div></div>
    <div class="panel" id="schema-panel" style="display:none">
      <div class="panel-header">Schema <span id="schema-toggle" style="font-size:10px;color:#475569">hide</span></div>
      <div class="panel-body" id="schema-body"></div>
    </div>
    <div class="panel" id="stats-panel" style="display:none">
      <div class="panel-header">Analysis</div>
      <div class="panel-body" id="stats-body"></div>
    </div>
  </div>
  <div id="map"></div>
  <div class="api-log">
    <div class="api-log-header"><span>API Log</span><span id="log-clear" style="cursor:pointer;color:#475569">clear</span></div>
    <div class="api-log-body" id="api-log"></div>
  </div>
</div>

<script>
// ─── Config ───
const CMS_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3001/api/v1'
  : `http://${window.location.hostname}:3001/api/v1`;

let DATASET_ID = '';
let schemaData = null;
let selectedId = null;
let geoJsonLayer = null;
let activeType = '';
let loadTimer = null;

// ─── API with logging ───
const apiLogs = [];
async function apiGet(path) {
  const url = `${CMS_URL}${path}`;
  const shortUrl = path.length > 80 ? path.substring(0, 77) + '...' : path;
  const t0 = performance.now();
  try {
    const res = await fetch(url);
    const elapsed = Math.round(performance.now() - t0);
    const data = await res.json();
    const count = data.pagination?.total ?? data.features?.length ?? data.entities?.length ?? (Array.isArray(data) ? data.length : '—');
    apiLogs.unshift({ ts: new Date(), method: 'GET', url: shortUrl, status: res.status, elapsed, count, ok: res.ok });
    renderApiLog();
    return data;
  } catch (err) {
    const elapsed = Math.round(performance.now() - t0);
    apiLogs.unshift({ ts: new Date(), method: 'GET', url: shortUrl, status: 'ERR', elapsed, count: '—', ok: false });
    renderApiLog();
    throw err;
  }
}

function renderApiLog() {
  const el = document.getElementById('api-log');
  el.innerHTML = apiLogs.slice(0, 30).map(l => {
    const ts = l.ts.toLocaleTimeString();
    return `<div class="log-entry"><span class="log-ts">${ts}</span> <span class="log-method">${l.method}</span> <span class="log-url">${l.url}</span> <span class="log-status ${l.ok ? 'ok' : 'err'}">${l.status}</span> <span class="log-meta">${l.elapsed}ms · ${l.count} items</span></div>`;
  }).join('');
}

document.getElementById('log-clear').onclick = () => { apiLogs.length = 0; renderApiLog(); };

// ─── Map ───
const map = L.map('map').setView([35.715, 139.783], 15);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OSM',
  maxZoom: 19,
}).addTo(map);

// ─── Init ───
async function init() {
  // 1. Discover
  const datasets = await apiGet('/delivery/datasets');
  if (!datasets.length) { document.getElementById('list').innerHTML = '<div class="loading">No published datasets.</div>'; return; }
  DATASET_ID = datasets[0].id;
  document.getElementById('app-title').textContent = datasets[0].name;
  document.title = `${datasets[0].name} — Viewer`;
  document.getElementById('count-badge').textContent = `${datasets[0].snapshot.entityCount} features`;

  // 2. Schema
  schemaData = await apiGet(`/delivery/datasets/${DATASET_ID}/schema`);
  renderSchema();

  // 3. Build filters from schema enum fields
  if (schemaData?.models?.[0]) {
    const model = schemaData.models[0];
    const enumField = model.fields.find(f => f.fieldType === 'enum_' && f.enumValues);
    if (enumField) {
      const el = document.getElementById('filters');
      el.innerHTML = `<span class="filter-chip active" data-type="" data-field="${enumField.key}">All</span>` +
        (enumField.enumValues || []).slice(0, 12).map(v =>
          `<span class="filter-chip" data-type="${v}" data-field="${enumField.key}">${v}</span>`
        ).join('');
      el.querySelectorAll('.filter-chip').forEach(chip => {
        chip.onclick = () => {
          el.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          activeType = chip.dataset.type;
          loadMapData();
        };
      });
    }
  }

  // 4. Search (debounced)
  document.getElementById('search').oninput = () => {
    clearTimeout(loadTimer);
    loadTimer = setTimeout(() => loadMapData(), 300);
  };

  // 5. Load stats in background
  loadStats();

  // 6. Initial map load
  map.on('moveend', () => loadMapData());
  loadMapData();
}

// ─── Load map data via server-side bbox ───
async function loadMapData() {
  const bounds = map.getBounds();
  const bbox = `${bounds.getWest().toFixed(4)},${bounds.getSouth().toFixed(4)},${bounds.getEast().toFixed(4)},${bounds.getNorth().toFixed(4)}`;
  const search = document.getElementById('search').value.trim();
  const enumField = document.querySelector('.filter-chip')?.dataset.field;

  let path = `/delivery/datasets/${DATASET_ID}/entities?bbox=${bbox}&pageSize=500&format=geojson`;
  if (activeType && enumField) path += `&filter[${enumField}]=${encodeURIComponent(activeType)}`;
  // Note: name search uses client-side filter (API has exact match only)

  try {
    const fc = await apiGet(path);
    let features = fc.features || [];

    // Client-side name search (API doesn't have substring search)
    if (search) {
      const q = search.toLowerCase();
      features = features.filter(f => (f.properties?.name || '').toLowerCase().includes(q));
    }

    // Render map
    if (geoJsonLayer) map.removeLayer(geoJsonLayer);
    geoJsonLayer = L.geoJSON({ type: 'FeatureCollection', features }, {
      style: (feature) => ({
        color: feature.id === selectedId ? '#ef4444' : '#3b82f6',
        weight: feature.id === selectedId ? 3 : 1,
        fillColor: feature.id === selectedId ? '#fecaca' : '#60a5fa',
        fillOpacity: feature.id === selectedId ? 0.6 : 0.25,
      }),
      onEachFeature: (feature, layer) => {
        layer.on('click', () => selectFeature(feature));
      },
    }).addTo(map);

    // Render list
    renderList(features);
    document.getElementById('count-badge').textContent = `${fc.metadata?.total ?? features.length} in view`;
  } catch (err) {
    document.getElementById('list').innerHTML = `<div class="loading" style="color:#f87171">${err.message}</div>`;
  }
}

function renderList(features) {
  const el = document.getElementById('list');
  const items = features.slice(0, 150);
  el.innerHTML = items.map(f => `
    <div class="list-item${selectedId === f.id ? ' active' : ''}" data-id="${f.id}">
      <div class="li-name">${f.properties?.name || 'Unnamed'}</div>
      <div class="li-meta">
        ${f.properties?._type ? `<span class="li-type">${f.properties.building_type || f.properties._type}</span>` : ''}
        ${f.properties?.height ? ` ${f.properties.height}m` : ''}
        ${f.properties?.levels ? ` ${f.properties.levels}F` : ''}
      </div>
    </div>
  `).join('') + (features.length > 150 ? `<div class="loading">${features.length - 150} more — zoom in</div>` : '');

  el.querySelectorAll('.list-item').forEach(item => {
    item.onclick = () => {
      const f = features.find(x => x.id === item.dataset.id);
      if (f) selectFeature(f);
    };
  });
}

function selectFeature(feature) {
  selectedId = feature.id;
  const props = feature.properties || {};

  // Schema-driven popup
  let rows = '';
  if (schemaData?.models?.[0]) {
    for (const field of schemaData.models[0].fields) {
      const val = props[field.key];
      if (val !== undefined && val !== null && val !== '') {
        rows += `<div class="dp-row"><span class="dp-label">${field.label}</span><span class="dp-value">${val}</span></div>`;
      }
    }
  } else {
    for (const [k, v] of Object.entries(props)) {
      if (k.startsWith('_')) continue;
      rows += `<div class="dp-row"><span class="dp-label">${k}</span><span class="dp-value">${v}</span></div>`;
    }
  }

  const popup = L.popup({ maxWidth: 300 }).setContent(`
    <div class="detail-popup">
      <h3>${props.name || 'Unnamed Building'}</h3>
      ${rows}
      <div style="margin-top:6px;font-size:10px;color:#94a3b8">v${props._version || '?'} · ${feature.id?.substring(0,8)}...</div>
    </div>
  `);

  if (feature.geometry?.coordinates?.[0]) {
    const coords = feature.geometry.coordinates[0];
    const lats = coords.map(c => c[1]);
    const lons = coords.map(c => c[0]);
    popup.setLatLng([(Math.min(...lats)+Math.max(...lats))/2, (Math.min(...lons)+Math.max(...lons))/2]).openOn(map);
  }

  loadMapData(); // re-render with selection highlight
}

// ─── Schema panel ───
function renderSchema() {
  if (!schemaData?.models?.[0]) return;
  const model = schemaData.models[0];
  document.getElementById('schema-panel').style.display = 'block';
  document.getElementById('schema-body').innerHTML =
    `<div style="font-size:12px;color:#94a3b8;margin-bottom:6px">${model.name} · ${model.geometryType}</div>` +
    model.fields.map(f =>
      `<div class="schema-field"><span class="sf-name">${f.label}</span><span class="sf-type">${f.fieldType}${f.isRequired ? ' *' : ''}</span></div>`
    ).join('');

  // Toggle
  let visible = true;
  document.getElementById('schema-toggle').onclick = () => {
    visible = !visible;
    document.getElementById('schema-body').style.display = visible ? '' : 'none';
    document.getElementById('schema-toggle').textContent = visible ? 'hide' : 'show';
  };
}

// ─── Stats (loaded once in background) ───
async function loadStats() {
  let all = [];
  let page = 1;
  while (true) {
    const r = await apiGet(`/delivery/datasets/${DATASET_ID}/entities?page=${page}&pageSize=500`);
    all.push(...r.entities);
    if (all.length >= r.pagination.total) break;
    page++;
  }

  document.getElementById('stats-panel').style.display = 'block';
  const heights = all.filter(e => e.properties.height).map(e => e.properties.height);
  const typeCounts = {};
  all.forEach(e => { const t = e.properties.building_type || '?'; typeCounts[t] = (typeCounts[t]||0)+1; });
  const sorted = Object.entries(typeCounts).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  document.getElementById('stats-body').innerHTML = `
    <div class="stat-row"><span class="stat-label">Total</span><span class="stat-value">${all.length}</span></div>
    <div class="stat-row"><span class="stat-label">With height</span><span class="stat-value">${heights.length}</span></div>
    ${heights.length ? `<div class="stat-row"><span class="stat-label">Avg height</span><span class="stat-value">${(heights.reduce((a,b)=>a+b,0)/heights.length).toFixed(1)}m</span></div>
    <div class="stat-row"><span class="stat-label">Max height</span><span class="stat-value">${Math.max(...heights)}m</span></div>` : ''}
    <div style="margin-top:8px">${sorted.slice(0,5).map(([t,c]) =>
      `<div class="bar-row"><span class="bar-label">${t}</span><div class="bar-fill" style="width:${Math.round(c/max*100)}px"></div><span class="bar-count">${c}</span></div>`
    ).join('')}</div>
  `;
}

init().catch(err => {
  document.getElementById('list').innerHTML = `<div class="loading" style="color:#f87171">Failed to connect<br><br>${err.message}<br><br>CMS: ${CMS_URL}</div>`;
});
</script>
</body>
</html>
